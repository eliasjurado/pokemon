<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test CSS</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a1a; --surface: #16162a; --text: #f0f0f8; --accent: #6390f0; }
body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
h1 { color: var(--accent); }
  </style>
</head>
<body>
  <h1>TEST CSS</h1>
  <p>Si ves esto con fondo oscuro y título azul, el CSS inline funciona.</p>
</body>
</html>
