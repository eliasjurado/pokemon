<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album de Stickers Pokemon</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--surface:#16162a;--surface2:#1e1e3a;--text:#f0f0f8;--text2:#9999bb;--border:rgba(255,255,255,.07);--accent:#6390f0;--success:#4ade80;--radius:14px;--radius-sm:8px}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px}
h1{font-size:1.1rem;background:linear-gradient(135deg,#f7d02c,#ee8130,#6390f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.bar select,.bar button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem;min-height:36px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer}
.card:hover{border-color:var(--accent)}
.card-img-wrap{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;padding:6px;position:relative}
.card-img-wrap img{width:100%;height:100%;object-fit:contain}
.card-flag{position:absolute;top:4px;right:4px;font-size:.9rem;background:rgba(0,0,0,.5);border-radius:4px;padding:1px 3px}

.card-body{padding:6px 8px}
.card-name{font-size:.8rem;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}
.card-id{font-size:.65rem;color:var(--text2)}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:16px;flex-wrap:wrap}
.pagination button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.8rem;min-width:36px;min-height:36px}
.pagination button.active{background:var(--accent);border-color:var(--accent)}
.pagination button:disabled{opacity:.3}
#status{position:fixed;top:10px;right:10px;background:#000;color:#0f0;padding:4px 8px;font-family:monospace;font-size:11px;z-index:9999;border-radius:4px}
#count{font-size:.75rem;color:var(--text2);margin-left:auto}
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-content{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto}
.modal-img{background:var(--surface2);padding:20px;display:flex;align-items:center;justify-content:center}
.modal-img img{max-width:100%;max-height:40vh;object-fit:contain;border-radius:8px}
.modal-body{padding:16px 20px 24px;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:1.2rem;width:32px;height:32px;border-radius:50%;cursor:pointer}
.modal-name{font-size:1.3rem;font-weight:700;margin-bottom:4px;text-transform:uppercase}
.modal-id{font-size:.85rem;color:var(--text2);margin-bottom:10px}
.stats-row{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.stat{display:flex;align-items:center;gap:8px}
.stat-label{font-size:.75rem;font-weight:700;width:32px;color:var(--text2);text-align:right}
.stat-bar{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.stat-fill{height:100%;border-radius:5px;background:linear-gradient(90deg, #f44336, #ff9800, #4caf50)}
.stat-val{font-size:.8rem;font-weight:700;width:28px;color:var(--text)}
@media(min-width:768px){.modal{align-items:center;padding:16px}.modal-content{max-width:420px;border-radius:14px}}
</style>
</head>
<body>
<h1>Album de Stickers Pokemon</h1>
<div class="bar">
<select id="fType"><option value="all">Tipo: Todos</option></select>
<select id="fRegion"><option value="all">Region: Todas</option></select>
<select id="fCountry"><option value="all">Pais: Todos</option></select>
<button id="resetBtn">Limpiar</button>
<span id="count"></span>
</div>
<div class="grid" id="gallery"></div>
<div class="pagination" id="pagination"></div>
<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>
<footer style="text-align:center;padding:24px 12px;font-size:.8rem;color:var(--text2);margin-top:20px;border-top:1px solid var(--border)">
  Con amor ❤️ para mis hijos por <a href="https://eliasjurado.com" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">Elias Jurado</a>
</footer>
<button id="pwaBtn" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:24px;padding:10px 20px;font-size:.85rem;font-weight:600;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer">📲 Instalar App</button>
<script>
const ITEMS = window.innerWidth < 768 ? 4 : 16;
const s = document.createElement('div');
s.id = 'status';
s.style.cssText = 'position:fixed;top:10px;right:10px;background:#000;color:#0f0;padding:4px 8px;font-family:monospace;font-size:11px;z-index:9999;border-radius:4px';
document.body.appendChild(s);

const TYPES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
const REGIONS = ['Kanto','Johto','Hoenn','Sinnoh','Unova','Kalos','Alola','Galar','Paldea'];
let ALL_COUNTRIES = [];

s.textContent = 'loading...';

fetch('pokemon.json').then(r => r.json()).then(all => {
  s.textContent = 'gen ' + all.length;

  const sel = document.getElementById('fType');
  TYPES.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent='Tipo: '+t; sel.appendChild(o); });
  const selR = document.getElementById('fRegion');
  REGIONS.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent='Region: '+r; selR.appendChild(o); });
  const selC = document.getElementById('fCountry');
  const seen = {};
  ALL_COUNTRIES = all.filter(p => { if (!p.countryCode || p.countryCode==='???' || seen[p.countryCode]) return false; seen[p.countryCode]=1; return true; }).map(p => ({flag:p.country, name: p.countryName, code:p.countryCode})).sort((a,b) => a.name.localeCompare(b.name));
  ALL_COUNTRIES.forEach(c => { const o = document.createElement('option'); o.value=c.flag; o.textContent=c.flag+' '+c.name; selC.appendChild(o); });

  function getColl() { try { return JSON.parse(localStorage.getItem('pokemonCollected')||'{}'); } catch(e) { return {}; } }
  function isColl(id) { return !!getColl()[id]; }
  function toggleColl(id) { const c = getColl(); if (c[id]) delete c[id]; else c[id]=1; localStorage.setItem('pokemonCollected', JSON.stringify(c)); }

  let page = 1;
  let state = {type:'all', region:'all', country:'all'};
  let totalP = 1;

  function render() {
    const coll = getColl();
    const filtered = all.filter(p =>
      (state.type==='all' || p.type===state.type) &&
      (state.region==='all' || p.region===state.region) &&
      (state.country==='all' || p.country===state.country)
    );
    totalP = Math.max(1, Math.ceil(filtered.length / ITEMS));
    if (page > totalP) page = totalP;
    const start = (page-1) * ITEMS;
    const slice = filtered.slice(start, start+ITEMS);
    let html = '';
    for (let i = 0; i < slice.length; i++) {
      const p = slice[i];
      const c = !!coll[p.id];
      html += '<div class="card" data-id="'+p.id+'"><div class="card-img-wrap"><img src="'+p.img+'" loading="lazy"><span class="card-flag">'+p.country+'</span></div><div class="card-body"><div class="card-name">'+(c?'✓ ':'')+p.name+'</div><div class="card-id">'+p.type+'</div></div></div>';
    }
    document.getElementById('gallery').innerHTML = html;
    const collCount = Object.keys(coll).length;
    document.getElementById('count').textContent = filtered.length+' resultados, '+collCount+'/'+all.length+' coleccionados';

    let ph = '<button '+(page<=1?'disabled':'')+' data-p="'+(page-1)+'">‹</button>';
    const mx = 5; let s2 = Math.max(1, page-2); let e2 = Math.min(totalP, s2+mx-1);
    if (e2-s2<mx-1) s2 = Math.max(1, e2-mx+1);
    for (let i=s2;i<=e2;i++) ph += '<button class="'+(i===page?'active':'')+'" data-p="'+i+'">'+i+'</button>';
    ph += '<button '+(page>=totalP?'disabled':'')+' data-p="'+(page+1)+'">›</button>';
    document.getElementById('pagination').innerHTML = ph;
    document.querySelectorAll('.pagination button').forEach(b => {
      if (b.disabled) return;
      b.addEventListener('click', () => { page = parseInt(b.dataset.p); render(); window.scrollTo(0,0); });
    });
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => { openModal(parseInt(c.dataset.id)); });
    });
    s.textContent = 'p'+page+'/'+totalP+' ('+slice.length+')';
  }

  function openModal(id) {
    const p = all.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modalContent').innerHTML =
      '<button class="modal-close" id="mClose">✕</button>'+
      '<div class="modal-img"><img src="'+p.img+'"></div>'+
      '<div class="modal-body">'+
        '<div class="modal-name">'+p.name+'</div>'+
        '<div class="modal-id">#'+String(p.id).padStart(3,'0')+' · '+p.region+'</div>'+
        '<div style="font-size:.85rem;color:var(--text2);margin-bottom:8px">Tipo: '+p.type+'</div>'+
        '<div style="font-size:.85rem;color:var(--text2);margin-bottom:8px">'+p.country+' '+p.countryCode+' · '+p.countryName+'</div>'+
        '<div class="stats-row">'+
          '<div class="stat"><span class="stat-label">ATA</span><div class="stat-bar"><div class="stat-fill" style="width:'+p.ata/150*100+'%"></div></div><span class="stat-val">'+p.ata+'</span></div>'+
          '<div class="stat"><span class="stat-label">DEF</span><div class="stat-bar"><div class="stat-fill" style="width:'+p.def/150*100+'%"></div></div><span class="stat-val">'+p.def+'</span></div>'+
          '<div class="stat"><span class="stat-label">VEL</span><div class="stat-bar"><div class="stat-fill" style="width:'+p.vel/150*100+'%"></div></div><span class="stat-val">'+p.vel+'</span></div>'+
        '</div>'+
      '</div>';
    document.getElementById('modal').classList.add('open');
    document.getElementById('mClose').addEventListener('click', closeModal);
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  document.getElementById('fType').addEventListener('change', e => { state.type = e.target.value; page=1; render(); });
  document.getElementById('fRegion').addEventListener('change', e => { state.region = e.target.value; page=1; render(); });
  document.getElementById('fCountry').addEventListener('change', e => { state.country = e.target.value; page=1; render(); });
  document.getElementById('resetBtn').addEventListener('click', () => {
    state = {type:'all', region:'all', country:'all'};
    document.getElementById('fType').value = 'all';
    document.getElementById('fRegion').value = 'all';
    document.getElementById('fCountry').value = 'all';
    page = 1;
    render();
  });

  render();

  // --- Swipe gesture for pagination ---
  let x0 = 0;
  document.addEventListener('touchstart', e => { x0 = e.changedTouches[0].screenX; }, {passive:true});
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - x0;
    if (Math.abs(dx) > 60) {
      if (dx < 0 && page < totalP) { page++; render(); }
      else if (dx > 0 && page > 1) { page--; render(); }
    }
  }, {passive:true});

  // --- ServiceWorker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // --- PWA Install Button ---
  let installPrompt = null;
  const pwaBtn = document.getElementById('pwaBtn');
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    installPrompt = e;
    pwaBtn.style.display = 'block';
    pwaBtn.textContent = '📲 Instalar App';
  });
  pwaBtn.addEventListener('click', async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const res = await installPrompt.userChoice;
      if (res.outcome === 'accepted') pwaBtn.style.display = 'none';
      installPrompt = null;
    }
  });
  window.addEventListener('appinstalled', () => { pwaBtn.style.display = 'none'; });
  if (navigator.serviceWorker) {
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      pwaBtn.style.display = 'block';
      pwaBtn.textContent = '🔄 Actualizar';
      pwaBtn.onclick = () => { window.location.reload(); };
    });
  }
}).catch(e => { s.textContent = 'ERROR: ' + e.message; });
</script>
</body>
</html>
