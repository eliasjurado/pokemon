<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Album del Mundial Pokémon</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--surface:#16162a;--surface2:#1e1e3a;--text:#f0f0f8;--text2:#9999bb;--border:rgba(255,255,255,.07);--accent:#6390f0;--success:#4ade80;--radius:14px;--radius-sm:8px}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:150px 12px 70px}
header{position:fixed;top:0;left:0;right:0;background:var(--bg);padding:12px 12px 8px;z-index:100;border-bottom:1px solid var(--border)}
h1{font-size:clamp(.82rem,4.5vw,1.1rem);white-space:nowrap;background:linear-gradient(135deg,#f7d02c,#ee8130,#6390f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center}
.bar select,.bar button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem;min-height:36px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInRev{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

#gallery.slide-next>*{animation:slideIn .25s ease-out}
#gallery.slide-prev>*{animation:slideInRev .25s ease-out}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:var(--accent)}
.card:active{transform:scale(.96);border-color:var(--accent)}
.card-img-wrap{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;padding:6px;position:relative}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;transition:transform .3s;image-rendering:pixelated}
@media(hover:hover){.card:hover .card-img-wrap img{transform:scale(1.08) translateY(-2px);animation:float 2s ease-in-out infinite}}
.card-flag{position:absolute;top:4px;right:4px;font-size:.9rem;background:rgba(0,0,0,.5);border-radius:4px;padding:1px 3px}
.github-star{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;color:var(--text2);text-decoration:none;margin-left:8px;background:var(--surface2);padding:2px 8px;border-radius:10px;border:1px solid var(--border);transition:color .15s;vertical-align:middle}
.github-star:hover{color:#f7d02c;border-color:#f7d02c}
.card-body{padding:6px 8px}
.card-name{font-size:.8rem;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}
.card-id{font-size:.65rem;color:var(--text2)}
.card-fb{display:inline-block;font-size:.6rem;color:#fff;font-weight:600;margin-top:4px;padding:1px 6px;border-radius:6px;background:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:16px;flex-wrap:wrap}
.pagination button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.8rem;min-width:36px;min-height:36px}
.pagination button.active{background:var(--accent);border-color:var(--accent)}
.pagination button:disabled{opacity:.3}
#status{position:fixed;top:10px;right:10px;background:#000;color:#0f0;padding:4px 8px;font-family:monospace;font-size:11px;z-index:9999;border-radius:4px}
#count{font-size:.75rem;color:var(--text2);margin-left:auto}

/* Modal */
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-content{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-img{min-height:35vh;display:flex;align-items:center;justify-content:center;background:var(--surface2);padding:20px;position:relative}
.modal-img img{max-width:100%;max-height:35vh;width:auto;height:auto;object-fit:contain;border-radius:8px;transition:opacity .2s;image-rendering:pixelated;cursor:pointer}
.modal-body{padding:16px 20px 24px;position:relative}
.modal-close{position:sticky;top:12px;float:right;margin-right:0;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:1.2rem;width:32px;height:32px;border-radius:50%;cursor:pointer;z-index:10}
.modal-name{font-size:1.3rem;font-weight:700;margin-bottom:2px;text-transform:uppercase}
.modal-gus{font-size:.82rem;color:var(--text2);margin-bottom:4px}
.modal-id{font-size:.75rem;color:var(--text2);margin-bottom:4px}

/* Toggle buttons */
.img-controls{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;position:absolute;bottom:10px;left:8px;right:8px;z-index:5}
.img-controls button{background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:.68rem;cursor:pointer;white-space:nowrap;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent}
.img-controls button:active{background:rgba(99,144,240,.7)}
.img-controls button.active{background:var(--accent);border-color:var(--accent)}
.img-controls button:disabled{opacity:.3;cursor:default}

/* Info pills */
.info-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.72rem;color:var(--text2)}
.pill strong{color:var(--text);margin-right:3px}

/* Flavor text */
.flavor{font-size:.82rem;color:var(--text2);line-height:1.5;margin-bottom:12px;font-style:italic;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--accent)}

/* Stats */
.stats-title{font-size:.75rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:12px}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px 2px}
.stat-label{font-size:.62rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.stat-val{font-size:.9rem;font-weight:800;color:var(--text);line-height:1}

/* Evolution chain */
.evo-section{margin-bottom:12px}
.evo-title{font-size:.75rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.evo-chain{display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.evo-link{display:flex;align-items:center;gap:4px}
.evo-item{text-align:center;cursor:pointer;padding:4px;border-radius:var(--radius-sm);border:2px solid transparent;transition:border-color .15s}
.evo-item:hover{border-color:var(--accent)}
.evo-item.active{border-color:var(--accent);background:var(--surface2)}
.evo-item img{width:48px;height:48px;object-fit:contain;display:block;image-rendering:pixelated}
.evo-item span{font-size:.6rem;color:var(--text2);display:block;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evo-arrow{color:var(--text2);font-size:1rem;opacity:.5;flex-shrink:0}

/* Collection toggle */
.coll-btn{display:block;width:100%;padding:12px;margin-top:10px;font-size:.9rem;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}

@media(min-width:768px){.modal{align-items:center;padding:16px}.modal-content{max-width:440px;border-radius:14px}}
</style>
</head>
<body>
<header>
<h1>Album del Mundial Pokémon
<a class="github-star" href="https://github.com/eliasjurado/pokemon" target="_blank" rel="noopener" id="ghStars" title="Dar estrella en GitHub"><svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> ★ <span id="ghCount">…</span></a>
</h1>
<div class="bar">
<select id="fType"><option value="all">Tipo: Todos</option></select>
<select id="fRegion"><option value="all">Region: Todas</option></select>
<select id="fCountry"><option value="all">Pais: Todos</option></select>
<button id="resetBtn">Limpiar</button>
<span id="count"></span>
</div>
</header>
<div class="grid" id="gallery"></div>
<div class="pagination" id="pagination"></div>
<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>
<footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:10px 12px;font-size:.8rem;color:var(--text2);background:var(--bg);border-top:1px solid var(--border);z-index:100">
  Con amor ❤️ para mis hijos por <a href="https://eliasjurado.com" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">Elias Jurado</a>
</footer>
<button id="pwaBtn" style="display:none;position:fixed;bottom:80px;right:16px;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:10px 20px;font-size:.85rem;font-weight:600;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer">📲 Instalar App</button>
<script>
const ITEMS = window.innerWidth < 768 ? 4 : 16;
const s = document.createElement('div');
s.id = 'status';
s.style.cssText = 'position:fixed;top:10px;right:10px;background:#000;color:#0f0;padding:4px 8px;font-family:monospace;font-size:11px;z-index:9999;border-radius:4px';
document.body.appendChild(s);
function adjustPad(){var h=document.querySelector('header').offsetHeight;document.body.style.paddingTop=(h+17)+'px'}
setTimeout(adjustPad,50);window.addEventListener('resize',adjustPad);

const TYPES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
const REGIONS = ['Kanto','Johto','Hoenn','Sinnoh','Unova','Kalos','Alola','Galar','Paldea'];
let ALL_COUNTRIES = [];

// Modal state
  let modalPokemon = null;
  let viewMode = 'sticker'; // 'sticker' | 'official' | 'shiny'

s.textContent = 'loading...';

fetch('https://api.github.com/repos/eliasjurado/pokemon').then(r=>r.json()).then(d=>{const e=document.getElementById('ghCount');if(d.stargazers_count!==undefined)e.textContent=d.stargazers_count}).catch(()=>{});

fetch('pokemon.json').then(r => r.json()).then(all => {
  s.textContent = 'gen ' + all.length;

  let saved = {};
  try { saved = JSON.parse(localStorage.getItem('pokemonState')||'{}'); } catch(e) {}
  let state = saved.state || {type:'all', region:'all', country:'all'};
  let page = saved.page || 1;
  let pageDir = 0;
  let totalP = 1;
  function saveState() { localStorage.setItem('pokemonState', JSON.stringify({state, page})); }

  const sel = document.getElementById('fType');
  TYPES.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent='Tipo: '+t; sel.appendChild(o); });
  const selR = document.getElementById('fRegion');
  REGIONS.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent='Region: '+r; selR.appendChild(o); });
  const selC = document.getElementById('fCountry');
  const seen = {};
  ALL_COUNTRIES = all.filter(p => { if (!p.countryCode || p.countryCode==='???' || seen[p.countryCode]) return false; seen[p.countryCode]=1; return true; }).map(p => ({flag:p.country, name: p.countryName, code:p.countryCode})).sort((a,b) => a.name.localeCompare(b.name));
  ALL_COUNTRIES.forEach(c => { const o = document.createElement('option'); o.value=c.flag; o.textContent=c.flag+' '+c.name; selC.appendChild(o); });
  sel.value = state.type; selR.value = state.region; selC.value = state.country;

  function getColl() { try { return JSON.parse(localStorage.getItem('pokemonCollected')||'{}'); } catch(e) { return {}; } }
  function isColl(id) { return !!getColl()[id]; }
  function toggleColl(id) { const c = getColl(); if (c[id]) delete c[id]; else c[id]=1; localStorage.setItem('pokemonCollected', JSON.stringify(c)); }

  function spriteUrl(id,size) { return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon'+(size==='shiny'?'/shiny':'')+'/'+id+'.png'; }
  function artworkUrl(id,shiny) { return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork'+(shiny?'/shiny':'')+'/'+id+'.png'; }
  function cryUrl(id) { return 'https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/'+id+'.ogg'; }
  function placeholderDataUrl(collected) {
    const bg = collected ? '#0d2818' : '#16162a';
    const fg = collected ? '#4ade80' : '#3a3a5c';
    const icon = collected ? '&#x2713;' : '?';
    const icon2 = collected ? '&#x2605;' : '&#x2694;';
    return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="'+bg+'" rx="12"/><circle cx="100" cy="78" r="48" fill="none" stroke="'+fg+'" stroke-width="3"/><path d="M52 78h96" stroke="'+fg+'" stroke-width="3"/><circle cx="100" cy="78" r="12" fill="none" stroke="'+fg+'" stroke-width="3"/><text x="100" y="160" text-anchor="middle" fill="'+fg+'" font-size="48" font-weight="bold" font-family="sans-serif">'+icon+'</text></svg>');
  }

  function render() {
    const coll = getColl();
    const filtered = all.filter(p =>
      (state.type==='all' || p.type===state.type) &&
      (state.region==='all' || p.region===state.region) &&
      (state.country==='all' || p.country===state.country)
    );
    totalP = Math.max(1, Math.ceil(filtered.length / ITEMS));
    if (page > totalP) page = totalP;
    const start = (page-1) * ITEMS;
    const slice = filtered.slice(start, start+ITEMS);
    let html = '';
    for (let i = 0; i < slice.length; i++) {
      const p = slice[i];
      const c = !!coll[p.id];
      const fb = p.football;
      const placeholder = placeholderDataUrl(c);
      const onerr = ' onerror="this.onerror=null;this.src=\''+placeholder+'\'"';
      const fbBadge = (fb && fb.jersey) ? '<span class="card-fb">#'+fb.jersey+' '+fb.role+'</span>' : '';
      html += '<div class="card" data-id="'+p.id+'"><div class="card-img-wrap"><img src="'+p.img+'" loading="lazy"'+onerr+'><span class="card-flag">'+p.country+'</span></div><div class="card-body"><div class="card-name">'+(c?'✓ ':'')+p.name+'</div><div class="card-id">'+p.type+'</div>'+fbBadge+'</div></div>';
    }
    const gal = document.getElementById('gallery');
    gal.className = 'grid' + (pageDir>0?' slide-next':pageDir<0?' slide-prev':'');
    gal.innerHTML = html;
    pageDir = 0;
    const collCount = Object.keys(coll).length;
    document.getElementById('count').textContent = filtered.length+' resultados, '+collCount+'/'+all.length+' coleccionados';

    let ph = '<button '+(page<=1?'disabled':'')+' data-p="'+(page-1)+'">‹</button>';
    const mx = 5; let s2 = Math.max(1, page-2); let e2 = Math.min(totalP, s2+mx-1);
    if (e2-s2<mx-1) s2 = Math.max(1, e2-mx+1);
    for (let i=s2;i<=e2;i++) ph += '<button class="'+(i===page?'active':'')+'" data-p="'+i+'">'+i+'</button>';
    ph += '<button '+(page>=totalP?'disabled':'')+' data-p="'+(page+1)+'">›</button>';
    document.getElementById('pagination').innerHTML = ph;
    document.querySelectorAll('.pagination button').forEach(b => {
      if (b.disabled) return;
      b.addEventListener('click', () => { const np = parseInt(b.dataset.p); pageDir = np > page ? 1 : np < page ? -1 : 0; page = np; render(); window.scrollTo(0,0); });
    });
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => { openModal(parseInt(c.dataset.id)); });
    });
    s.textContent = 'p'+page+'/'+totalP+' ('+slice.length+')';
    saveState();
  }

  function openModal(id) {
    modalPokemon = all.find(x => x.id === id);
    if (!modalPokemon) return;
    viewMode = 'sticker';
    renderModal();
    document.getElementById('modal').classList.add('open');
  }

  function renderModal() {
    const p = modalPokemon;
    const d = p.pokeapi_details;
    const c = isColl(p.id);

    let imgSrc = p.img;
    if (viewMode === 'official' && d && d.id) {
      imgSrc = artworkUrl(d.id, false);
    } else if (viewMode === 'shiny' && d && d.id) {
      imgSrc = artworkUrl(d.id, true);
    }

    // Evolution chain HTML
    let evoHtml = '';
    if (d && d.evolution_chain) {
      const chain = d.evolution_chain; // [[[name,id],...], [[name,id],...], ...]
      let currentLevel = -1;
      for (let level = 0; level < chain.length; level++) {
        for (let j = 0; j < chain[level].length; j++) {
          if (chain[level][j][1] === d.id) currentLevel = level;
        }
      }

      const items = [];
      for (let level = 0; level < chain.length; level++) {
        const levelPokes = chain[level];
        for (let j = 0; j < levelPokes.length; j++) {
          const [name, pid] = levelPokes[j];
          const isActive = (pid === d.id);
          const pokeData = all.find(x => x.pokeapi_details && x.pokeapi_details.id === pid);
          const stickerImg = pokeData ? pokeData.img : null;
          items.push({name, pid, isActive, level, stickerImg});
        }
      }

      // Group by level, render with arrows between levels
      let currentLevelItems = [];
      for (let i = 0; i < items.length; i++) {
        if (i > 0 && items[i].level !== items[i-1].level) {
          if (currentLevelItems.length > 0) {
            evoHtml += renderEvoGroup(currentLevelItems);
            evoHtml += '<span class="evo-arrow">→</span>';
          }
          currentLevelItems = [];
        }
        currentLevelItems.push(items[i]);
      }
      if (currentLevelItems.length > 0) {
        evoHtml += renderEvoGroup(currentLevelItems);
      }

      if (evoHtml) {
        evoHtml = '<div class="evo-section"><div class="evo-title">Cadena Evolutiva</div><div class="evo-chain">' + evoHtml + '</div></div>';
      }
    }

    // Stats
    let statsHtml = '';
    const statLabels = {'hp':'HP','attack':'ATA','defense':'DEF','special-attack':'SP.ATA','special-defense':'SP.DEF','speed':'VEL'};
    const statOrder = ['hp','attack','defense','special-attack','special-defense','speed'];
    if (d && d.stats_full) {
      statsHtml = '<div class="stats-title">Estadísticas Base</div><div class="stats-row">';
      for (let si = 0; si < statOrder.length; si++) {
        const key = statOrder[si];
        const val = d.stats_full[key] || 0;
        statsHtml += '<div class="stat"><span class="stat-label">'+statLabels[key]+'</span><span class="stat-val">'+val+'</span></div>';
      }
      statsHtml += '</div>';
    }

    // Info pills
    const pills = [];
    if (d && d.genus) pills.push(d.genus);
    if (d && d.height_m) pills.push(d.height_m+' m');
    if (d && d.weight_kg) pills.push(d.weight_kg+' kg');
    if (d && d.abilities) pills.push(d.abilities.map(a => a.replace('-',' ')).join(', '));

    const pillHtml = pills.length ? '<div class="info-pills">'+pills.map(pill => '<span class="pill">'+pill+'</span>').join('')+'</div>' : '';

    // Flavor text
    const flavorHtml = (d && d.flavor) ? '<div class="flavor">"'+d.flavor+'"</div>' : '';

    // Football info
    let footballHtml = '';
    if (p.football) {
      const fbPills = [
        '<span class="pill">'+p.country+' '+p.football.team+'</span>',
        '<span class="pill">👕 #'+p.football.jersey+'</span>',
        '<span class="pill">📍 '+p.football.position+'</span>',
        '<span class="pill">🎯 '+p.football.role+'</span>'
      ];
      footballHtml = '<div class="stats-title">⚽ Fútbol</div><div class="info-pills">'+fbPills.join('')+'</div><div class="flavor">'+p.football.advantage+'</div>';
    }

    // Shiny/official controls
    const hasOfficial = d && d.id;
    const hasId = d && d.id;
    const controlsHtml = hasId ? '<div class="img-controls">' +
      '<button id="ctrlSticker" class="'+(viewMode==='sticker'?'active':'')+'">✨ Card</button>' +
      '<button id="ctrlOfficial" class="'+(viewMode==='official'?'active':'')+'">🎨 Oficial</button>' +
      '<button id="ctrlShiny" class="'+(viewMode==='shiny'?'active':'')+'">⭐ Shiny</button>' +
      '<button id="ctrlCry">🔊 Grito</button>' +
    '</div>' : '';

    document.getElementById('modalContent').innerHTML =
      '<button class="modal-close" id="mClose">✕</button>'+
      '<div class="modal-img">'+
        '<img id="modalImg" src="'+imgSrc+'" onerror="this.onerror=null;this.src=\''+placeholderDataUrl(isColl(p.id))+'\'">'+
        controlsHtml+
      '</div>'+
      '<div class="modal-body">'+
        '<div class="modal-name">'+p.name+'</div>'+
        (d && d.genus ? '<div class="modal-gus">'+d.genus+'</div>' : '')+
        '<div class="modal-id">#'+String(p.id).padStart(3,'0')+' · '+p.region+' · '+p.country+' '+p.countryCode+' · '+p.countryName+'</div>'+
        footballHtml+
        '<div class="stats-title" style="margin-top:12px">📋 Pokémon</div>'+
        pillHtml+
        flavorHtml+
        statsHtml+
        evoHtml+
        '<button class="coll-btn" id="collBtn" style="background:'+(c?'var(--success)':'var(--surface2)')+';color:'+(c?'#000':'var(--text)')+'">'+(c?'✓ Coleccionado':'Marcar como coleccionado')+'</button>'+
      '</div>';

    // Carousel: swipe on image changes view mode
    const MODES = ['sticker', 'official', 'shiny'];
    const imgWrap = document.querySelector('.modal-img');
    let touchX = 0, touchY = 0;
    if (imgWrap) {
      imgWrap.addEventListener('touchstart', e => { touchX = e.changedTouches[0].screenX; touchY = e.changedTouches[0].screenY; }, {passive:true});
      imgWrap.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].screenX - touchX;
        const dy = e.changedTouches[0].screenY - touchY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          const idx = MODES.indexOf(viewMode);
          if (dx < 0) viewMode = MODES[(idx + 1) % MODES.length];
          else viewMode = MODES[(idx - 1 + MODES.length) % MODES.length];
          renderModal();
        }
      }, {passive:true});
    }
    // Tap on image plays cry
    const imgEl = document.getElementById('modalImg');
    if (imgEl && d && d.id) {
      imgEl.addEventListener('click', () => {
        const audio = new Audio(cryUrl(d.id));
        audio.volume = 0.5;
        audio.play().catch(() => {});
      });
    }

    // Bind controls
    document.getElementById('mClose').addEventListener('click', closeModal);
    document.getElementById('collBtn').addEventListener('click', () => { toggleColl(p.id); renderModal(); });

    if (document.getElementById('ctrlSticker')) {
      document.getElementById('ctrlSticker').addEventListener('click', () => { viewMode = 'sticker'; renderModal(); });
    }
    if (document.getElementById('ctrlOfficial')) {
      document.getElementById('ctrlOfficial').addEventListener('click', () => { viewMode = 'official'; renderModal(); });
    }
    if (document.getElementById('ctrlShiny')) {
      document.getElementById('ctrlShiny').addEventListener('click', () => { viewMode = 'shiny'; renderModal(); });
    }
    if (document.getElementById('ctrlCry') && d && d.id) {
      document.getElementById('ctrlCry').addEventListener('click', () => {
        const audio = new Audio(cryUrl(d.id));
        audio.volume = 0.5;
        audio.play().catch(() => {});
      });
    }

    // Bind evolution clicks
    document.querySelectorAll('.evo-item').forEach(el => {
      el.addEventListener('click', () => {
        const eid = parseInt(el.dataset.pid);
        if (eid && eid !== p.id) {
          closeModal();
          openModal(eid);
        }
      });
    });
  }

  function renderEvoGroup(items) {
    if (items.length === 0) return '';
    return items.map(item => {
      const pokeData = all.find(x => x.pokeapi_details && x.pokeapi_details.id === item.pid);
      const img = pokeData && pokeData.img ? pokeData.img : spriteUrl(item.pid);
      return '<div class="evo-item'+(item.isActive?' active':'')+'" data-pid="'+item.pid+'"><img src="'+img+'" onerror="this.src=\''+spriteUrl(item.pid)+'\'"><span>'+item.name+'</span></div>';
    }).join('');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); modalPokemon = null; }
  document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  document.getElementById('fType').addEventListener('change', e => { pageDir=0; state.type = e.target.value; page=1; render(); });
  document.getElementById('fRegion').addEventListener('change', e => { pageDir=0; state.region = e.target.value; page=1; render(); });
  document.getElementById('fCountry').addEventListener('change', e => { pageDir=0; state.country = e.target.value; page=1; render(); });
  document.getElementById('resetBtn').addEventListener('click', () => {
    pageDir=0; state = {type:'all', region:'all', country:'all'};
    document.getElementById('fType').value = 'all';
    document.getElementById('fRegion').value = 'all';
    document.getElementById('fCountry').value = 'all';
    page = 1;
    render();
  });

  render();

  // --- Swipe gesture for pagination ---
  let x0 = 0;
  document.addEventListener('touchstart', e => { x0 = e.changedTouches[0].screenX; }, {passive:true});
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - x0;
    if (Math.abs(dx) > 60 && !document.getElementById('modal').classList.contains('open')) {
      if (dx < 0 && page < totalP) { pageDir = 1; page++; render(); }
      else if (dx > 0 && page > 1) { pageDir = -1; page--; render(); }
    }
  }, {passive:true});

  // --- ServiceWorker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // --- PWA Install Button ---
  let installPrompt = null;
  const pwaBtn = document.getElementById('pwaBtn');
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    installPrompt = e;
    pwaBtn.style.display = 'block';
    pwaBtn.textContent = '📲 Instalar App';
  });
  pwaBtn.addEventListener('click', async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const res = await installPrompt.userChoice;
      if (res.outcome === 'accepted') pwaBtn.style.display = 'none';
      installPrompt = null;
    }
  });
  window.addEventListener('appinstalled', () => { pwaBtn.style.display = 'none'; });
  if (navigator.serviceWorker) {
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        pwaBtn.style.display = 'block';
        pwaBtn.textContent = '📲 Actualizar App';
        pwaBtn.onclick = () => { window.location.reload(); };
      }
    });
  }
}).catch(e => { s.textContent = 'ERROR: ' + e.message; });
</script>
</body>
</html>
