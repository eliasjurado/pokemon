<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album de Stickers Pokemon</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--surface:#16162a;--surface2:#1e1e3a;--text:#f0f0f8;--text2:#9999bb;--border:rgba(255,255,255,.07);--accent:#6390f0;--success:#4ade80;--radius:14px;--radius-sm:8px}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px}
h1{font-size:1.1rem;background:linear-gradient(135deg,#f7d02c,#ee8130,#6390f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.bar select,.bar button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem;min-height:36px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer}
.card:hover{border-color:var(--accent)}
.card-img-wrap{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;padding:6px}
.card-img-wrap img{width:100%;height:100%;object-fit:contain}
.card-body{padding:6px 8px}
.card-name{font-size:.8rem;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-id{font-size:.65rem;color:var(--text2)}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:16px;flex-wrap:wrap}
.pagination button{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.8rem;min-width:36px;min-height:36px}
.pagination button.active{background:var(--accent);border-color:var(--accent)}
.pagination button:disabled{opacity:.3}
#status{position:fixed;top:10px;right:10px;background:#000;color:#0f0;padding:4px 8px;font-family:monospace;font-size:11px;z-index:9999;border-radius:4px}
#count{font-size:.75rem;color:var(--text2);margin-left:auto}
</style>
</head>
<body>
<div id="status">OK</div>
<h1>Album de Stickers Pokemon</h1>
<div class="bar">
<select id="fType"><option value="all">Tipo: Todos</option></select>
<select id="fRegion"><option value="all">Region: Todas</option></select>
<select id="fOrigin"><option value="all">Origen: Todos</option></select>
<select id="fColl"><option value="all">Estado: Todos</option><option value="collected">Coleccionados</option><option value="missing">Faltantes</option></select>
<button id="resetBtn">Limpiar</button>
<span id="count"></span>
</div>
<div class="grid" id="gallery"></div>
<div class="pagination" id="pagination"></div>
<script>
const s = document.getElementById('status');
const ITEMS_PER_PAGE = 12;

try {
  const TYPES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
  const REGIONS = ['Kanto','Johto','Hoenn','Sinnoh','Unova','Kalos','Alola','Galar','Paldea'];
  const ORIGINS = [
    {id:'pokemon-1',label:'Lamina 1'},{id:'pokemon-2',label:'Lamina 2'},
    {id:'pokemon-3',label:'Lamina 3'},{id:'pokemon-4',label:'Lamina 4'},
    {id:'sheet5',label:'Lamina 5'},{id:'sheet6',label:'Lamina 6'},{id:'sheet7',label:'Lamina 7'}
  ];
  const PREFIXES = ['pokemon-1','pokemon-2','pokemon-3','pokemon-4','sheet5','sheet6','sheet7'];
  const KNOWN = {1:['Pikachu','Electric','Kanto'],2:['Charizard','Fire','Kanto'],3:['Mewtwo','Psychic','Kanto'],4:['Gengar','Ghost','Kanto'],5:['Eevee','Normal','Kanto'],6:['Snorlax','Normal','Kanto'],7:['Lucario','Fighting','Sinnoh'],8:['Greninja','Water','Kalos']};

  const all = [];
  let id = 1;
  for (let pi = 0; pi < PREFIXES.length; pi++) {
    const prefix = PREFIXES[pi];
    for (let n = 1; n <= 32; n++) {
      const img = 'stickers/' + prefix + '_' + (n < 10 ? '0' + n : n) + '.png';
      const k = KNOWN[id];
      const name = k ? k[0] : 'Mystery #' + id;
      const type = k ? k[1] : TYPES[id % TYPES.length];
      const region = k ? k[2] : REGIONS[id % REGIONS.length];
      all.push({id:id, img:img, name:name, type:type, region:region, origin:prefix});
      id++;
    }
  }
  s.textContent = 'gen ' + all.length;

  const sel = document.getElementById('fType');
  TYPES.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent='Tipo: '+t; sel.appendChild(o); });
  const selR = document.getElementById('fRegion');
  REGIONS.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent='Region: '+r; selR.appendChild(o); });
  const selO = document.getElementById('fOrigin');
  ORIGINS.forEach(o => { const opt = document.createElement('option'); opt.value=o.id; opt.textContent='Origen: '+o.label; selO.appendChild(opt); });

  function getColl() { try { return JSON.parse(localStorage.getItem('pokemonCollected')||'{}'); } catch(e) { return {}; } }
  function isColl(id) { return !!getColl()[id]; }
  function toggleColl(id) { const c = getColl(); if (c[id]) delete c[id]; else c[id]=1; localStorage.setItem('pokemonCollected', JSON.stringify(c)); }

  let currentPage = 1;
  let state = {type:'all', region:'all', origin:'all', coll:'all'};

  function render() {
    const coll = getColl();
    const filtered = all.filter(p =>
      (state.type==='all' || p.type===state.type) &&
      (state.region==='all' || p.region===state.region) &&
      (state.origin==='all' || p.origin===state.origin) &&
      (state.coll==='all' || (state.coll==='collected') === !!coll[p.id])
    );
    const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const page = filtered.slice(start, start + ITEMS_PER_PAGE);
    let html = '';
    for (let i = 0; i < page.length; i++) {
      const p = page[i];
      const c = !!coll[p.id];
      html += '<div class="card" data-id="'+p.id+'"><div class="card-img-wrap"><img src="'+p.img+'" loading="lazy"></div><div class="card-body"><div class="card-name">'+(c?'✓ ':'')+p.name+'</div><div class="card-id">#'+p.id+' - '+p.type+'</div></div></div>';
    }
    document.getElementById('gallery').innerHTML = html;
    document.getElementById('count').textContent = filtered.length+' resultados, ' + Object.keys(coll).length + '/' + all.length + ' coleccionados';

    let pagHtml = '';
    pagHtml += '<button '+(currentPage<=1?'disabled':'')+' data-p="'+(currentPage-1)+'">‹</button>';
    const maxBtns = 5;
    let s2 = Math.max(1, currentPage - 2);
    let e2 = Math.min(totalPages, s2 + maxBtns - 1);
    if (e2 - s2 < maxBtns - 1) s2 = Math.max(1, e2 - maxBtns + 1);
    for (let i = s2; i <= e2; i++) {
      pagHtml += '<button class="'+(i===currentPage?'active':'')+'" data-p="'+i+'">'+i+'</button>';
    }
    pagHtml += '<button '+(currentPage>=totalPages?'disabled':'')+' data-p="'+(currentPage+1)+'">›</button>';
    document.getElementById('pagination').innerHTML = pagHtml;
    document.querySelectorAll('.pagination button').forEach(b => {
      if (b.disabled) return;
      b.addEventListener('click', () => { currentPage = parseInt(b.dataset.p); render(); window.scrollTo(0,0); });
    });
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => {
        toggleColl(parseInt(c.dataset.id));
        render();
      });
    });
    s.textContent = 'p' + currentPage + '/' + totalPages + ' (' + page.length + ' cards)';
  }

  document.getElementById('fType').addEventListener('change', e => { state.type = e.target.value; currentPage = 1; render(); });
  document.getElementById('fRegion').addEventListener('change', e => { state.region = e.target.value; currentPage = 1; render(); });
  document.getElementById('fOrigin').addEventListener('change', e => { state.origin = e.target.value; currentPage = 1; render(); });
  document.getElementById('fColl').addEventListener('change', e => { state.coll = e.target.value; currentPage = 1; render(); });
  document.getElementById('resetBtn').addEventListener('click', () => {
    state = {type:'all', region:'all', origin:'all', coll:'all'};
    document.getElementById('fType').value = 'all';
    document.getElementById('fRegion').value = 'all';
    document.getElementById('fOrigin').value = 'all';
    document.getElementById('fColl').value = 'all';
    currentPage = 1;
    render();
  });

  render();
} catch(e) {
  s.textContent = 'ERROR: ' + e.message;
}
</script>
</body>
</html>
